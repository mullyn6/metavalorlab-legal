<!doctype html>
<html lang="es">
<meta charset="utf-8">
<title>Demo Login TikTok</title>
<main style="max-width:720px;margin:40px auto;font:16px/1.6 system-ui">
  <h1>Demo Login Kit (OAuth 2.0)</h1>
  <button id="go" style="padding:10px 16px">Continuar con TikTok</button>
</main>
<script>
  const clientKey = 'sbaw2ar0dgysggu6z8';
  const redirectUri = 'https://mullyn6.github.io/metavalorlab-legal/redirect.html'; // o .../redirect.html/
  const scope = 'user.info.basic';
  const state = crypto.getRandomValues(new Uint8Array(16))
    .reduce((s, b) => s + ('0' + b.toString(16)).slice(-2), '');
  const url = 'https://www.tiktok.com/v2/auth/authorize/'
    + '?client_key=' + encodeURIComponent(clientKey)
    + '&scope=' + encodeURIComponent(scope)
    + '&response_type=code'
    + '&redirect_uri=' + encodeURIComponent(redirectUri)
    + '&state=' + encodeURIComponent(state);

  document.getElementById('go').addEventListener('click', () => {
    location.href = url; // evita &amp; en atributos href
  });
</script>

</html>
