<!doctype html><html lang="es"><meta charset="utf-8">
<title>MetaValor Lab · Redirect</title>
<main style="max-width:720px;margin:40px auto;font:16px/1.6 system-ui">
<h1>Redirección correcta</h1>
<p>Hemos recibido la respuesta de TikTok.</p>
<pre id="out" style="white-space:pre-wrap;background:#f5f5f5;padding:12px;border-radius:8px"></pre>
<p style="color:#555">Nota: en producción, el intercambio code→token se realiza en backend contra
<code>https://open.tiktokapis.com/v2/oauth/token/</code>.</p>
<script>
  const params = new URLSearchParams(location.search);
  const code   = params.get('code');
  const state  = params.get('state');
  const scopes = params.get('scopes');
  document.getElementById('out').textContent =
    `code: ${code}\nstate: ${state}\nscopes: ${scopes || '(no devuelto)'}\n`;
</script>
</main></html>
``
